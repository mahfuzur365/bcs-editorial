# Daily editorial pipeline — runs at 06:00 Bangladesh time (00:00 UTC).
# Free tier: GitHub Actions public repos have unlimited minutes;
# this run takes ~5 minutes.
name: daily-editorials

on:
  schedule:
    - cron: "0 0 * * *"        # 00:00 UTC == 06:00 AM BST (UTC+6)
  workflow_dispatch: {}         # manual "Run workflow" button for testing

concurrency:
  group: daily-editorials
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Run pipeline
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python main.py
